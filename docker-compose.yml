version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: vertex_medical_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: vertex_medical
      MYSQL_USER: vertex_user
      MYSQL_PASSWORD: vertex_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: vertex_medical_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root1234
    ports:
      - "8088:80"

volumes:
  mysql_data:
